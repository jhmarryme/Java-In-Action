server.servlet.context-path=/
server.port=8002

# 集群的话，用英文逗号分隔
spring.rabbitmq.addresses=1.14.140.53:30050
spring.rabbitmq.username=jhmarryme
spring.rabbitmq.password=541224
# 默认是 / ，可以按不同的项目来分
spring.rabbitmq.virtual-host=/
spring.rabbitmq.connection-timeout=15000

# 这里配置的是一个工厂属性，在 @RabbitListener 注解中，可以指定你自己的 containerFactory 工厂 ,
# 有一些属性可以覆盖默认工厂的属性，比如 concurrency, 你可以针对每个消费者队列配置不一样的消费者线程
# 表示消费者消费成功消息以后需要手工的进行签收(ack)，默认为auto
spring.rabbitmq.listener.simple.acknowledge-mode=manual
# 消费者并发线程数量
spring.rabbitmq.listener.simple.concurrency=5
# 最大消费并发线程数量
spring.rabbitmq.listener.simple.max-concurrency=10
# 消息预取数量
spring.rabbitmq.listener.simple.prefetch=1


##	作业：
##	最好不要在代码里写死配置信息，尽量使用这种方式也就是配置文件的方式
##	在代码里使用 	${}	方式进行设置配置: ${spring.rabbitmq.listener.order.exchange.name}
spring.rabbitmq.listener.order.exchange.name=order-exchange
spring.rabbitmq.listener.order.exchange.durable=true
spring.rabbitmq.listener.order.exchange.type=topic
spring.rabbitmq.listener.order.exchange.key=order.*

spring.application.name=rabbit-producer
spring.http.encoding.charset=UTF-8
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.jackson.default-property-inclusion=NON_NULL


