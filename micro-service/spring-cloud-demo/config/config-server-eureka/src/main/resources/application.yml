spring:
  application:
    name: config-server-eureka
  cloud:
    config:
      server:
        git:
          uri: git@github.com:jhmarryme/config-repo.git # 注意SSH链接地址
          ignore-local-ssh-settings: true # 重要！忽略本地ssh配置，使用下面密钥。方便移植（如：容器部署）
          # 现在的github默认分支为main
          default-label: main
          force-pull: true # 强制拉取资源文件
          #          # 指定寻找的路径
          #          search-paths:
          #          username:
          #          password:
          private-key: |
            -----BEGIN RSA PRIVATE KEY-----
            
            -----END RSA PRIVATE KEY-----

server:
  port: 40011

eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:20000/eureka