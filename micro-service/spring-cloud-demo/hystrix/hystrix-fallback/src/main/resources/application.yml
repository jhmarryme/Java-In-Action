spring:
  application:
    name: hystrix-consumer
server:
  port: 40004

eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:20000/eureka

feign:
  hystrix:
    enabled: true # 开启Feign下面的Hystrix功能
hystrix:
  command:
    default:
      fallback:
        enabled: true # 是否开启服务降级
      execution:
        timeout:
          enabled: true # 全局超时
        isolation:
          thread:
            timeoutInMilliseconds: 1000 # 超时时间
            interruptOnTimeout: true # 超时以后终止线程
            interruptOnFutureCancel: true # 取消的时候终止线程
      circuitBreaker:
        requestVolumeThreshold: 5 # 熔断的前提条件（请求的数量），在一定的时间窗口内，请求达到5个以后，才开始进行熔断判断
        errorThresholdPercentage: 50 # 超过50%的失败请求，则熔断开关开启
        sleepWindowInMilliseconds: 15000 # 当熔断开启以后，经过多少秒再进入半开状态
      metrics:
        rollingStats:
          timeInMilliseconds: 20000 # 配置时间窗口
    # 针对commandKey方法级别的超时设置
    cacheKey:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: 4000 # 超时时间
            interruptOnTimeout: true # 超时以后终止线程
            interruptOnFutureCancel: true # 取消的时候终止线程

feign-client:
  ribbon:
    # 每台机器最大重试次数
    MaxAutoRetries: 2
    # 可以再重试几台机器
    MaxAutoRetriesNextServer: 2
    # 连接超时
    ConnectTimeout: 1000
    # 业务处理超时
    ReadTimeout: 8000
    # 在所有HTTP Method进行重试
    OkToRetryOnAllOperations: true

# actuator暴露接口
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: '*'