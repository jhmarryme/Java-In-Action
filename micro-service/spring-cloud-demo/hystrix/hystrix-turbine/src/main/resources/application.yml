spring:
  application:
    name: hystrix-turbine
server:
  port: 40006
management:
  server:
    port: 40007

eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:20000/eureka

turbine:
  aggregator:
    clusterConfig: default
  app-config: hystrix-consumer # 指定了所需要监控的服务名
  cluster-name-expression: '"default"' # 在实际使用中，我们应该使用多个Turbine监控不同地区的机器，然后再做聚合，在这里作为演示，配置default即可
  combine-host-port: true # 将端口和hostname作为区分不同服务的条件（默认只使用Host）
  instanceUrlSuffix:
    default: actuator/hystrix.stream
