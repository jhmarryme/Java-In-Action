server:
  port: 40019

spring:
  application:
    name: zipkin-server
  main:
    allow-bean-definition-overriding: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:20000/eureka/

management:
  metrics:
    web:
      server:
        # 关闭后台窗口输出的一些无效错误日志
        auto-time-requests: false
